<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frappy</title>

    <link rel="stylesheet" href="style.css?v=9999">
</head>
<body>

<div class="profile-setup">

    <div class="logo">
        FRAPPY
    </div>

    <p style="
        text-align:center;
        color:#ff4d4d;
        margin-bottom:15px;
        font-weight:700;
    ">
        BUILD TEST V999
    </p>

    <div class="setup-card">

        <h2>Создай профиль</h2>

        <input
            type="text"
            id="username"
            class="input"
            placeholder="Уникальный ник"
        >

        <input
            type="text"
            id="status"
            class="input"
            placeholder="Статус"
        >

        <button
            id="createBtn"
            class="create-btn"
        >
            Создать профиль
        </button>

        <div id="message"></div>

    </div>

</div>

<script src="app.js?v=9999"></script>

</body>
</html>
