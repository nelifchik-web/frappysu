<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frappy</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile-setup">

    <div class="logo">FRAPPY</div>

    <div class="setup-card">

        <h2>Создай профиль</h2>

        <input
            type="text"
            id="username"
            placeholder="Уникальный ник"
            class="input"
        >

        <input
            type="text"
            id="status"
            placeholder="Статус (необязательно)"
            class="input"
        >

        <button id="createBtn" class="create-btn">
            Создать профиль
        </button>

        <div id="message"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
