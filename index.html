<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frappy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --pink: #cd00cd;
            --purple: #9400d3;
            --darkpurple: #660099;
            --bg: #06030a;
            --sidebar: rgba(10,6,20,0.95);
            --server: rgba(5,2,10,0.95);
            --hover: #150a20;
            --active: #1f0f2e;
            --text: #e8d5f5;
            --text2: #8b6ba0;
            --radius: 16px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        
        /* СЕРВЕРНАЯ ПАНЕЛЬ */
        .server-bar {
            width: 60px; background: var(--server); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center;
            gap: 10px; padding: 16px 6px; flex-shrink: 0;
            border-right: 1px solid rgba(205,0,205,0.12); z-index: 10;
        }
        .server-icon {
            width: 44px; height: 44px; border-radius: var(--radius);
            background: rgba(10,6,20,0.6); border: 1px solid rgba(255,255,255,0.04);
            color: var(--text2); font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
        }
        .server-icon.active {
            border-radius: 14px; background: rgba(205,0,205,0.2);
            border-color: var(--pink); color: #fff;
            box-shadow: 0 0 15px rgba(205,0,205,0.6);
        }
        
        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            flex: 1; display: flex; flex-direction: column;
            min-width: 0; z-index: 1;
        }
        
        /* ВЕРХ */
        .header {
            padding: 14px 20px;
            background: rgba(6,3,10,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(205,0,205,0.1);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 30; flex-shrink: 0;
        }
        .logo {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        /* ЭКРАНЫ */
        .screen { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .screen.active { display: block; }
        
        /* РЕГИСТРАЦИЯ */
        .auth-box {
            max-width: 350px; margin: 40px auto;
            background: rgba(20,10,30,0.8); border-radius: 20px;
            border: 1px solid rgba(205,0,205,0.15); padding: 30px 24px;
            text-align: center;
        }
        .auth-box h2 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-box p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
        
        .input-field {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(205,0,205,0.15);
            color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px;
        }
        .input-field::placeholder { color: var(--text2); }
        
        .btn {
            width: 100%; padding: 14px; border-radius: 12px;
            border: none; font-weight: 700; font-size: 15px; cursor: pointer;
            margin-bottom: 8px;
        }
        .btn-primary { background: var(--pink); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text2); }
        .error-msg { color: #ff4466; font-size: 12px; margin-bottom: 8px; display: none; }
        
        /* ПРОФИЛЬ */
        .profile-card {
            max-width: 350px; margin: 20px auto;
            background: rgba(20,10,30,0.8); border-radius: 20px;
            border: 1px solid rgba(205,0,205,0.15); padding: 24px;
            text-align: center;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; margin: 0 auto 16px;
        }
        .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .profile-email { color: var(--text2); font-size: 13px; margin-bottom: 16px; }
        
        /* ПОИСК */
        .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .search-box {
            flex: 1; padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(205,0,205,0.15);
            color: var(--text); font-size: 14px; outline: none;
        }
        .search-btn {
            padding: 12px 20px; border-radius: 12px;
            background: var(--pink); color: #fff; border: none;
            font-weight: 600; cursor: pointer;
        }
        
        .track-card, .video-card {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; border-radius: 12px; cursor: pointer;
            margin-bottom: 8px; background: rgba(20,10,30,0.6);
            border: 1px solid rgba(205,0,205,0.08);
        }
        .track-thumb, .video-thumb {
            width: 48px; height: 48px; border-radius: 10px;
            background-size: cover; background-position: center;
            flex-shrink: 0;
        }
        .track-info, .video-info { flex: 1; min-width: 0; }
        .track-title, .video-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .track-artist, .video-artist { color: var(--text2); font-size: 12px; }
        
        .fav-btn {
            background: none; border: none; color: var(--text2);
            font-size: 18px; cursor: pointer; padding: 8px;
        }
        .fav-btn.liked { color: #ff4466; }
        
        /* NOW BAR */
        .now-bar {
            position: fixed; bottom: 16px; left: 76px; right: 16px;
            background: rgba(15,5,25,0.97); backdrop-filter: blur(20px);
            border: 1px solid rgba(205,0,205,0.2);
            border-radius: 16px;
            padding: 10px 14px;
            z-index: 40;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .now-bar.active { display: flex; }
        .now-progress {
            position: absolute; top: 0; left: 8px; right: 8px;
            height: 2px; background: rgba(255,255,255,0.1);
            border-radius: 0 0 4px 4px;
        }
        .now-progress-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--pink), var(--purple));
            border-radius: 0 0 4px 4px;
        }
        .now-thumb {
            width: 40px; height: 40px; border-radius: 10px;
            background-size: cover; background-position: center;
            flex-shrink: 0;
        }
        .now-info { flex: 1; min-width: 0; }
        .now-title { font-weight: 600; font-size: 13px; }
        .now-artist { color: var(--text2); font-size: 11px; }
        .now-controls { display: flex; gap: 10px; align-items: center; }
        .now-btn {
            background: none; border: none; color: #fff;
            font-size: 18px; cursor: pointer; padding: 6px;
        }
        .now-btn.play {
            width: 36px; height: 36px; border-radius: 50%;
            background: #fff; color: var(--bg); font-size: 14px;
        }
        .now-btn.liked { color: #ff4466; }
        
        .tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(205,0,205,0.15);
            background: rgba(255,255,255,0.03); color: var(--text2);
            font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .tab-btn.active { background: rgba(205,0,205,0.2); border-color: var(--pink); color: #fff; }
        
        /* ЧАТЫ */
        .chat-msg {
            padding: 10px 14px; border-radius: 12px;
            margin-bottom: 8px; max-width: 80%;
        }
        .chat-msg.mine { background: rgba(205,0,205,0.2); margin-left: auto; }
        .chat-msg.other { background: rgba(20,10,30,0.8); }
        .chat-input-row { display: flex; gap: 8px; margin-top: 16px; }
    </style>
</head>
<body>

    <!-- СЕРВЕРНАЯ ПАНЕЛЬ -->
    <div class="server-bar">
        <button class="server-icon active" onclick="switchMainTab('music')"><i class="fa-solid fa-headphones"></i></button>
        <button class="server-icon" onclick="switchMainTab('video')"><i class="fa-solid fa-film"></i></button>
        <button class="server-icon" onclick="switchMainTab('chats')"><i class="fa-solid fa-message"></i></button>
        <button class="server-icon" onclick="switchMainTab('profile')"><i class="fa-solid fa-user"></i></button>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-content">
        <div class="header">
            <div class="logo">FRAPPY</div>
            <div style="display:flex;gap:8px">
                <span id="tabProfile" style="color:var(--text2);font-size:13px;cursor:pointer;display:none" onclick="switchMainTab('profile')">Профиль</span>
                <span id="tabLogin" style="color:var(--text2);font-size:13px;cursor:pointer" onclick="switchMainTab('login')">Войти</span>
            </div>
        </div>

        <!-- ЭКРАН ВХОДА -->
        <div class="screen active" id="screen-login">
            <div class="auth-box">
                <h2>Frappy</h2>
                <p>Войди или создай аккаунт</p>
                <input type="text" class="input-field" placeholder="Имя пользователя" id="loginName">
                <input type="password" class="input-field" placeholder="Пароль" id="loginPass">
                <div class="error-msg" id="loginError"></div>
                <button class="btn btn-primary" onclick="login()">Войти</button>
                <button class="btn btn-secondary" onclick="register()">Создать аккаунт</button>
            </div>
        </div>

        <!-- МУЗЫКА -->
        <div class="screen" id="screen-music">
            <div class="tab-row">
                <button class="tab-btn active" onclick="switchMusicTab('search')">Поиск</button>
                <button class="tab-btn" onclick="switchMusicTab('favorites')">Избранное</button>
                <button class="tab-btn" onclick="switchMusicTab('wave')">Моя волна</button>
            </div>
            <div id="musicSearch">
                <div class="search-row">
                    <input type="text" class="search-box" placeholder="Поиск трека..." id="searchInput">
                    <button class="search-btn" onclick="search()">Найти</button>
                </div>
                <div id="trackList"></div>
            </div>
            <div id="musicFavorites" style="display:none"><div id="favList"></div></div>
            <div id="musicWave" style="display:none">
                <div style="text-align:center;padding:40px">
                    <button onclick="startWave()" style="padding:12px 24px;border-radius:20px;background:var(--pink);color:#fff;border:none;font-weight:600;cursor:pointer;font-size:14px">Запустить волну</button>
                    <div id="waveTrack" style="margin-top:16px;font-weight:600"></div>
                </div>
            </div>
        </div>

        <!-- ВИДЕО -->
        <div class="screen" id="screen-video">
            <div class="search-row">
                <input type="text" class="search-box" placeholder="Поиск видео..." id="videoSearchInput">
                <button class="search-btn" onclick="searchVideo()">Найти</button>
            </div>
            <div id="videoList"></div>
        </div>

        <!-- ЧАТЫ -->
        <div class="screen" id="screen-chats">
            <div id="chatMessages"></div>
            <div class="chat-input-row">
                <input type="text" class="search-box" placeholder="Сообщение..." id="chatInput">
                <button class="search-btn" onclick="sendChat()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div class="screen" id="screen-profile">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <div class="profile-name" id="profileName"></div>
                <div class="profile-email" id="profileEmail"></div>
                <button class="btn btn-secondary" onclick="logout()">Выйти</button>
            </div>
        </div>
    </div>

    <!-- NOW BAR -->
    <div class="now-bar" id="nowBar">
        <div class="now-progress"><div class="now-progress-fill" id="nowProgressFill"></div></div>
        <div class="now-thumb" id="nowThumb">🎵</div>
        <div class="now-info">
            <div class="now-title" id="nowTitle">Выбери трек</div>
            <div class="now-artist" id="nowArtist">Нажми на трек</div>
        </div>
        <div class="now-controls">
            <button class="now-btn" id="nowFavBtn" onclick="toggleFavCurrent()"><i class="fa-solid fa-heart"></i></button>
            <button class="now-btn" onclick="prev()"><i class="fa-solid fa-backward-step"></i></button>
            <button class="now-btn play" id="nowPlayBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
            <button class="now-btn" onclick="next()"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </div>

    <iframe id="ytFrame" style="display:none" allow="autoplay"></iframe>

    <script>
        const API_KEY = 'AIzaSyDW1cbsx1G-w6ogFtBI_tEvjpvk5bRuwzU';
        
        let tracks = [];
        let videos = [];
        let currentIndex = -1;
        let isPlaying = false;
        let currentUser = JSON.parse(localStorage.getItem('frappy_user') || 'null');
        let users = JSON.parse(localStorage.getItem('frappy_users') || '{}');
        let favorites = JSON.parse(localStorage.getItem('frappy_favs') || '[]');
        let chatMessages = JSON.parse(localStorage.getItem('frappy_chats') || '[]');
        let progressInterval;
        let currentTab = 'search';
        let currentScreen = 'music';
        
        // Автовход
        if (currentUser) {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('tabLogin').style.display = 'none';
            document.getElementById('tabProfile').style.display = 'block';
            switchMainTab('music');
        }
        
        // ПЕРЕКЛЮЧЕНИЕ ГЛАВНЫХ РАЗДЕЛОВ
        function switchMainTab(tab) {
            currentScreen = tab;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.server-icon').forEach(s => s.classList.remove('active'));
            
            if (tab === 'music') {
                document.getElementById('screen-music').classList.add('active');
                document.querySelector('.server-icon:nth-child(1)').classList.add('active');
            } else if (tab === 'video') {
                document.getElementById('screen-video').classList.add('active');
                document.querySelector('.server-icon:nth-child(2)').classList.add('active');
            } else if (tab === 'chats') {
                document.getElementById('screen-chats').classList.add('active');
                document.querySelector('.server-icon:nth-child(3)').classList.add('active');
                renderChats();
            } else if (tab === 'profile') {
                document.getElementById('screen-profile').classList.add('active');
                document.querySelector('.server-icon:nth-child(4)').classList.add('active');
                if (currentUser) {
                    document.getElementById('profileName').textContent = currentUser.name;
                    document.getElementById('profileEmail').textContent = currentUser.name + '@frappy.app';
                    document.getElementById('profileAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
                }
            } else if (tab === 'login') {
                document.getElementById('screen-login').classList.add('active');
            }
        }
        
        function switchMusicTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('musicSearch').style.display = tab === 'search' ? 'block' : 'none';
            document.getElementById('musicFavorites').style.display = tab === 'favorites' ? 'block' : 'none';
            document.getElementById('musicWave').style.display = tab === 'wave' ? 'block' : 'none';
            if (tab === 'favorites') renderFavorites();
        }
        
        // РЕГИСТРАЦИЯ
        function register() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if (!name || !pass) { showError('Заполни все поля'); return; }
            users = JSON.parse(localStorage.getItem('frappy_users') || '{}');
            if (users[name]) { showError('Пользователь уже существует'); return; }
            users[name] = { name, pass };
            localStorage.setItem('frappy_users', JSON.stringify(users));
            currentUser = { name, pass };
            localStorage.setItem('frappy_user', JSON.stringify(currentUser));
            document.getElementById('loginName').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginError').style.display = 'none';
            afterLogin();
        }
        
        function login() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if (!name || !pass) { showError('Заполни все поля'); return; }
            users = JSON.parse(localStorage.getItem('frappy_users') || '{}');
            if (users[name] && users[name].pass === pass) {
                currentUser = { name, pass };
                localStorage.setItem('frappy_user', JSON.stringify(currentUser));
                document.getElementById('loginName').value = '';
                document.getElementById('loginPass').value = '';
                document.getElementById('loginError').style.display = 'none';
                afterLogin();
            } else {
                showError('Неверное имя или пароль. Зарегистрируйтесь сначала!');
            }
        }
        
        function showError(msg) { const el = document.getElementById('loginError'); el.style.display = 'block'; el.textContent = msg; }
        
        function afterLogin() {
            document.getElementById('tabLogin').style.display = 'none';
            document.getElementById('tabProfile').style.display = 'block';
            switchMainTab('music');
        }
        
        function logout() {
            localStorage.removeItem('frappy_user');
            currentUser = null;
            document.getElementById('tabLogin').style.display = 'block';
            document.getElementById('tabProfile').style.display = 'no
