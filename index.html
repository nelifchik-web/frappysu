<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frappy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--pink:#cd00cd;--purple:#9400d3;--bg:#06030a;--text:#e8d5f5;--text2:#8b6ba0}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
        .server-bar{width:60px;background:rgba(5,2,10,0.95);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 6px;flex-shrink:0;border-right:1px solid rgba(205,0,205,0.12);z-index:10}
        .server-icon{width:44px;height:44px;border-radius:16px;background:rgba(10,6,20,0.6);border:1px solid rgba(255,255,255,0.04);color:#8b6ba0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s}
        .server-icon.active{border-radius:14px;background:rgba(205,0,205,0.2);border-color:#cd00cd;color:#fff;box-shadow:0 0 15px rgba(205,0,205,0.6)}
        .main-content{flex:1;display:flex;flex-direction:column;min-width:0}
        .header{padding:14px 20px;background:rgba(6,3,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(205,0,205,0.1);display:flex;align-items:center;gap:12px}
        .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#cd00cd,#9400d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .screen{flex:1;overflow-y:auto;padding:20px 20px 100px 20px;display:none}
        .screen.active{display:block}
        .search-row{display:flex;gap:8px;margin-bottom:16px}
        .search-box{flex:1;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(205,0,205,0.15);color:#e8d5f5;font-size:14px;outline:none}
        .search-btn{padding:12px 20px;border-radius:12px;background:#cd00cd;color:#fff;border:none;font-weight:600;cursor:pointer}
        .card{display:flex;gap:12px;padding:12px;border-radius:12px;cursor:pointer;margin-bottom:8px;background:rgba(20,10,30,0.6);border:1px solid rgba(205,0,205,0.08)}
        .card-thumb{width:50px;height:50px;border-radius:10px;background-size:cover;background-position:center;flex-shrink:0}
        .card-info{flex:1;min-width:0;overflow:hidden}
        .card-title{font-weight:600;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card-sub{color:#8b6ba0;font-size:12px}
        .now-bar{position:fixed;bottom:16px;left:76px;right:16px;background:rgba(15,5,25,0.97);backdrop-filter:blur(20px);border:1px solid rgba(205,0,205,0.2);border-radius:16px;padding:10px 14px;z-index:40;display:none;align-items:center;gap:10px}
        .now-bar.active{display:flex}
        .now-progress{position:absolute;top:0;left:8px;right:8px;height:2px;background:rgba(255,255,255,0.1);border-radius:0 0 4px 4px}
        .now-progress-fill{width:0;height:100%;background:linear-gradient(90deg,#cd00cd,#9400d3);border-radius:0 0 4px 4px;transition:width 0.5s linear}
        .now-thumb{width:40px;height:40px;border-radius:10px;background-size:cover;background-position:center;flex-shrink:0}
        .now-info{flex:1;min-width:0;overflow:hidden}
        .now-title{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .now-artist{color:#8b6ba0;font-size:11px}
        .now-controls{display:flex;gap:10px;align-items:center}
        .now-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:6px}
        .now-btn.play{width:36px;height:36px;border-radius:50%;background:#fff;color:#06030a;font-size:14px}
        .video-overlay{position:fixed;inset:0;background:#000;z-index:50;display:none;flex-direction:column}
        .video-overlay.active{display:flex}
        .video-overlay iframe{flex:1;width:100%;border:none}
        .video-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;font-size:20px;cursor:pointer;z-index:51;display:flex;align-items:center;justify-content:center}
    </style>
</head>
<body>

<div class="server-bar">
    <button class="server-icon active" id="btnMusic"><i class="fa-solid fa-headphones"></i></button>
    <button class="server-icon" id="btnVideo"><i class="fa-solid fa-film"></i></button>
    <button class="server-icon" id="btnChats"><i class="fa-solid fa-message"></i></button>
</div>

<div class="main-content">
    <div class="header"><div class="logo">FRAPPY</div></div>
    
    <div class="screen active" id="screen-music">
        <div class="search-row">
            <input type="text" class="search-box" placeholder="Поиск трека..." id="musicInput">
            <button class="search-btn" id="btnMusicSearch">Найти</button>
        </div>
        <div id="musicList"><div style="text-align:center;color:#8b6ba0;padding:40px">Введи название и нажми Найти</div></div>
    </div>
    
    <div class="screen" id="screen-video">
        <div class="search-row">
            <input type="text" class="search-box" placeholder="Поиск видео..." id="videoInput">
            <button class="search-btn" id="btnVideoSearch">Найти</button>
        </div>
        <div id="videoList"></div>
    </div>
    
    <div class="screen" id="screen-chats">
        <div style="text-align:center;color:#8b6ba0;padding:40px"><i class="fa-solid fa-message" style="font-size:48px;color:#cd00cd;margin-bottom:12px"></i><div>Чаты скоро будут</div></div>
    </div>
</div>

<div class="now-bar" id="nowBar">
    <div class="now-progress"><div class="now-progress-fill" id="nowProgressFill"></div></div>
    <div class="now-thumb" id="nowThumb">🎵</div>
    <div class="now-info">
        <div class="now-title" id="nowTitle">Выбери трек</div>
        <div class="now-artist" id="nowArtist">Нажми на трек</div>
    </div>
    <div class="now-controls">
        <button class="now-btn" id="nowPrev"><i class="fa-solid fa-backward-step"></i></button>
        <button class="now-btn play" id="nowPlayBtn"><i class="fa-solid fa-play"></i></button>
        <button class="now-btn" id="nowNext"><i class="fa-solid fa-forward-step"></i></button>
    </div>
</div>

<div class="video-overlay" id="videoOverlay">
    <button class="video-close" onclick="closeVideo()">✕</button>
    <iframe id="videoFrame" allow="autoplay; fullscreen"></iframe>
</div>

<audio id="audioPlayer" style="display:none"></audio>

<script>
const SERVER = 'https://frappy-server.onrender.com';

let tracks=[],currentIndex=-1,isPlaying=!1,progressInterval;
let audio = document.getElementById('audioPlayer');

document.getElementById('btnMusic').addEventListener('click',()=>{switchTab('music')});
document.getElementById('btnVideo').addEventListener('click',()=>{switchTab('video')});
document.getElementById('btnChats').addEventListener('click',()=>{switchTab('chats')});
document.getElementById('btnMusicSearch').addEventListener('click',searchMusic);
document.getElementById('btnVideoSearch').addEventListener('click',searchVideo);
document.getElementById('nowPlayBtn').addEventListener('click',togglePlay);
document.getElementById('nowPrev').addEventListener('click',prev);
document.getElementById('nowNext').addEventListener('click',next);

function switchTab(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+t).classList.add('active');
    document.querySelectorAll('.server-icon').forEach(s=>s.classList.remove('active'));
    if(t==='music')document.getElementById('btnMusic').classList.add('active');
    if(t==='video')document.getElementById('btnVideo').classList.add('active');
    if(t==='chats')document.getElementById('btnChats').classList.add('active');
}

async function searchMusic(){
    let q=document.getElementById('musicInput').value.trim();
    if(!q)return;
    document.getElementById('musicList').innerHTML='<div style="text-align:center;color:#8b6ba0;padding:40px">Ищу...</div>';
    try{
        let res=await fetch(`${SERVER}/search?q=${encodeURIComponent(q)}`);
        let data=await res.json();
        if(Array.isArray(data) && data.length>0){tracks=data;renderTracks()}
        else{document.getElementById('musicList').innerHTML='<div style="text-align:center;color:#8b6ba0;padding:40px">Ничего не найдено</div>'}
    }catch(e){document.getElementById('musicList').innerHTML='<div style="text-align:center;color:#8b6ba0;padding:40px">Ошибка сервера</div>'}
}

async function searchVideo(){
    let q=document.getElementById('videoInput').value.trim();
    if(!q)return;
    document.getElementById('videoList').innerHTML='<div style="text-align:center;color:#8b6ba0;padding:40px">Ищу...</div>';
    try{
        let res=await fetch(`${SERVER}/search?q=${encodeURIComponent(q)}`);
        let data=await res.json();
        if(Array.isArray(data) && data.length>0){
            document.getElementById('videoList').innerHTML=data.map(i=>`
                <div class="card" onclick="playVideo('${i.id}')">
                    <div class="card-thumb" style="background-image:url('${i.thumb}')"></div>
                    <div class="card-info">
                        <div class="card-title">${i.title.length>40?i.title.substring(0,40)+'...':i.title}</div>
                        <div class="card-sub">${i.artist}</div>
                    </div>
                </div>
            `).join('');
        }
    }catch(e){document.getElementById('videoList').innerHTML='<div style="text-align:center;color:#8b6ba0;padding:40px">Ошибка сервера</div>'}
}

function renderTracks(){document.getElementById('musicList').innerHTML=tracks.map((t,i)=>`<div class="card" onclick="playMusic(${i})"><div class="card-thumb" style="background-image:url('${t.thumb}')"></div><div class="card-info"><div class="card-title">${t.title.length>40?t.title.substring(0,40)+'...':t.title}</div><div class="card-sub">${t.artist}</div></div></div>`).join('')}

function playMusic(i){
    currentIndex=i;let t=tracks[i],nt=document.getElementById('nowThumb');
    if(t.thumb?.startsWith('http')){nt.style.backgroundImage=`url('${t.thumb}')`;nt.textContent=''}else{nt.style.backgroundImage='';nt.textContent='🎵'}
    document.getElementById('nowTitle').textContent=t.title;
    document.getElementById('nowArtist').textContent='Загрузка...';
    document.getElementById('nowBar').classList.add('active');
    
    // Играем через Audio элемент (сервер стримит mp3)
    audio.src = `${SERVER}/stream/${t.id}`;
    audio.play().catch(() => {
        document.getElementById('nowArtist').textContent = 'Нажми Play';
    });
    
    audio.onplaying = () => { document.getElementById('nowArtist').textContent = t.artist; };
    
    isPlaying=!0;document.getElementById('nowPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>';
    startProgress();
}

function playVideo(id){
    document.getElementById('videoOverlay').classList.add('active');
    // Используем того же сервера для видео (или прямой YouTube если VPN включен)
    document.getElementById('videoFrame').src=`${SERVER}/stream/${id}`;
    // Фолбэк на YouTube
    setTimeout(() => {
        document.getElementById('videoFrame').src=`https://www.youtube.com/embed/${id}?autoplay=1`;
    }, 2000);
}

function closeVideo(){
    document.getElementById('videoOverlay').classList.remove('active');
    document.getElementById('videoFrame').src='';
}

function togglePlay(){
    if(isPlaying){audio.pause();isPlaying=!1;document.getElementById('nowPlayBtn').innerHTML='<i class="fa-solid fa-play"></i>';clearInterval(progressInterval)}
    else if(currentIndex>=0){audio.play().catch(()=>{});isPlaying=!0;document.getElementById('nowPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>';startProgress()}
}
function next(){if(tracks.length){currentIndex=(currentIndex+1)%tracks.length;playMusic(currentIndex)}}
function prev(){if(tracks.length){currentIndex=(currentIndex-1+tracks.length)%tracks.length;playMusic(currentIndex)}}
function startProgress(){clearInterval(progressInterval);let w=0;document.getElementById('nowProgressFill').style.width='0%';progressInterval=setInterval(()=>{w+=0.5;if(w>=100){w=0;next()}document.getElementById('nowProgressFill').style.width=w+'%'},1000)}
</script>
</body>
</html>
