<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frappy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --pink: #cd00cd;
            --purple: #9400d3;
            --bg: #06030a;
            --text: #e8d5f5;
            --text2: #8b6ba0;
            --radius: 16px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            padding: 14px 20px;
            background: rgba(6,3,10,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(205,0,205,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        /* ЭКРАНЫ */
        .screen { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .screen.active { display: block; }
        
        /* РЕГИСТРАЦИЯ */
        .auth-box {
            max-width: 350px; margin: 40px auto;
            background: rgba(20,10,30,0.8); border-radius: 20px;
            border: 1px solid rgba(205,0,205,0.15); padding: 30px 24px;
            text-align: center;
        }
        .auth-box h2 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-box p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
        
        .input-field {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(205,0,205,0.15);
            color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px;
        }
        .input-field::placeholder { color: var(--text2); }
        
        .btn {
            width: 100%; padding: 14px; border-radius: 12px;
            border: none; font-weight: 700; font-size: 15px; cursor: pointer;
            margin-bottom: 8px;
        }
        .btn-primary { background: var(--pink); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text2); }
        
        .error-msg { color: #ff4466; font-size: 12px; margin-bottom: 8px; display: none; }
        
        /* ПРОФИЛЬ */
        .profile-card {
            max-width: 350px; margin: 20px auto;
            background: rgba(20,10,30,0.8); border-radius: 20px;
            border: 1px solid rgba(205,0,205,0.15); padding: 24px;
            text-align: center;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; margin: 0 auto 16px;
        }
        .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .profile-email { color: var(--text2); font-size: 13px; margin-bottom: 16px; }
        
        /* МУЗЫКА */
        .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .search-box {
            flex: 1; padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(205,0,205,0.15);
            color: var(--text); font-size: 14px; outline: none;
        }
        .search-btn {
            padding: 12px 20px; border-radius: 12px;
            background: var(--pink); color: #fff; border: none;
            font-weight: 600; cursor: pointer;
        }
        
        .track-card {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; border-radius: 12px; cursor: pointer;
            margin-bottom: 8px; background: rgba(20,10,30,0.6);
            border: 1px solid rgba(205,0,205,0.08);
        }
        .track-thumb {
            width: 48px; height: 48px; border-radius: 10px;
            background-size: cover; background-position: center;
        }
        .track-info { flex: 1; }
        .track-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .track-artist { color: var(--text2); font-size: 12px; }
        
        /* ПЛЕЕР */
        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,5,20,0.98); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(205,0,205,0.2);
            padding: 10px 16px; z-index: 20;
            display: none;
        }
        .player-bar.active { display: block; }
        .player-row { display: flex; align-items: center; gap: 12px; }
        .player-thumb {
            width: 42px; height: 42px; border-radius: 10px;
            background-size: cover; background-position: center;
        }
        .player-info { flex: 1; }
        .player-title { font-weight: 600; font-size: 13px; }
        .player-artist { color: var(--text2); font-size: 11px; }
        .player-controls { display: flex; gap: 12px; align-items: center; }
        .p-btn { background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; }
        .p-btn.play { width: 40px; height: 40px; border-radius: 50%; background: #fff; color: var(--bg); }
        
        .tabs { display: flex; border-bottom: 1px solid rgba(205,0,205,0.1); }
        .tab {
            flex: 1; padding: 14px 0; text-align: center;
            color: var(--text2); font-size: 13px; font-weight: 600;
            cursor: pointer; border: none; background: none;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--pink); border-bottom-color: var(--pink); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FRAPPY</div>
        <div style="display:flex;gap:8px">
            <button class="tab" id="tabLogin" onclick="showScreen('login')" style="color:var(--text2);border:none;background:none;cursor:pointer;font-size:13px">Войти</button>
            <button class="tab" id="tabProfile" onclick="showScreen('profile')" style="color:var(--text2);border:none;background:none;cursor:pointer;font-size:13px;display:none">Профиль</button>
        </div>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div class="screen active" id="screen-login">
        <div class="auth-box">
            <h2>Frappy</h2>
            <p>Войди или создай аккаунт</p>
            <input type="text" class="input-field" placeholder="Имя пользователя" id="loginName">
            <input type="password" class="input-field" placeholder="Пароль" id="loginPass">
            <div class="error-msg" id="loginError">Неверное имя или пароль</div>
            <button class="btn btn-primary" onclick="login()">Войти</button>
            <button class="btn btn-secondary" onclick="register()">Создать аккаунт</button>
        </div>
    </div>

    <!-- ЭКРАН ПРОФИЛЯ -->
    <div class="screen" id="screen-profile">
        <div class="profile-card">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <div class="profile-name" id="profileName"></div>
            <div class="profile-email" id="profileEmail"></div>
            <button class="btn btn-secondary" onclick="logout()">Выйти</button>
        </div>
    </div>

    <!-- ЭКРАН МУЗЫКИ -->
    <div class="screen" id="screen-music">
        <div class="search-row" style="padding:20px 20px 0 20px">
            <input type="text" class="search-box" placeholder="Поиск трека..." id="searchInput">
            <button class="search-btn" onclick="search()">Найти</button>
        </div>
        <div id="trackList" style="padding:0 20px"></div>
    </div>

    <!-- ПЛЕЕР -->
    <div class="player-bar" id="playerBar">
        <div class="player-row">
            <div class="player-thumb" id="playerThumb">🎵</div>
            <div class="player-info">
                <div class="player-title" id="playerTitle">Выбери трек</div>
                <div class="player-artist" id="playerArtist">Нажми на трек</div>
            </div>
            <div class="player-controls">
                <button class="p-btn" onclick="prev()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="p-btn play" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                <button class="p-btn" onclick="next()"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyDW1cbsx1G-w6ogFtBI_tEvjpvk5bRuwzU';
        
        let tracks = [];
        let currentIndex = -1;
        let isPlaying = false;
        let currentUser = JSON.parse(localStorage.getItem('frappy_user') || 'null');
        let users = JSON.parse(localStorage.getItem('frappy_users') || '{}');
        
        // Показать экран
        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screen).classList.add('active');
            
            if (screen === 'profile') {
                document.getElementById('profileName').textContent = currentUser.name;
                document.getElementById('profileEmail').textContent = currentUser.name + '@frappy.app';
                document.getElementById('profileAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
            }
        }
        
        // Регистрация
        function register() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            
            if (!name || !pass) {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').textContent = 'Заполни все поля';
                return;
            }
            
            if (users[name]) {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').textContent = 'Пользователь уже существует';
                return;
            }
            
            users[name] = { name, pass, createdAt: new Date().toISOString() };
            localStorage.setItem('frappy_users', JSON.stringify(users));
            
            currentUser = { name, pass };
            localStorage.setItem('frappy_user', JSON.stringify(currentUser));
            
            afterLogin();
        }
        
        // Вход
        function login() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            
            if (users[name] && users[name].pass === pass) {
                currentUser = { name, pass };
                localStorage.setItem('frappy_user', JSON.stringify(currentUser));
                afterLogin();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').textContent = 'Неверное имя или пароль';
            }
        }
        
        function afterLogin() {
            document.getElementById('tabLogin').style.display = 'none';
            document.getElementById('tabProfile').style.display = 'block';
            showScreen('music');
        }
        
        function logout() {
            localStorage.removeItem('frappy_user');
            currentUser = null;
            document.getElementById('tabLogin').style.display = 'block';
            document.getElementById('tabProfile').style.display = 'none';
            showScreen('login');
            document.getElementById('loginName').value = '';
            document.getElementById('loginPass').value = '';
        }
        
        // Поиск музыки
        async function search() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            document.getElementById('trackList').innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px">Ищу...</div>';
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + ' music')}&type=video&maxResults=15&key=${API_KEY}`);
                const data = await res.json();
                if (data.items && data.items.length > 0) {
                    tracks = data.items.map(item => ({
                        id: item.id.videoId,
                        title: item.snippet.title,
                        artist: item.snippet.channelTitle,
                        thumb: item.snippet.thumbnails.default.url
                    }));
                    renderTracks();
                }
            } catch(e) {}
        }
        
        function renderTracks() {
            document.getElementById('trackList').innerHTML = tracks.map((t, i) => `
                <div class="track-card" onclick="play(${i})">
                    <div class="track-thumb" style="background-image:url('${t.thumb}')"></div>
                    <div class="track-info">
                        <div class="track-title">${t.title}</div>
                        <div class="track-artist">${t.artist}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function play(index) {
            currentIndex = index;
            const t = tracks[index];
            
            const pt = document.getElementById('playerThumb');
            if (t.thumb && t.thumb.startsWith('http')) {
                pt.style.backgroundImage = `url('${t.thumb}')`;
                pt.textContent = '';
            } else {
                pt.style.backgroundImage = '';
                pt.textContent = '🎵';
            }
            
            document.getElementById('playerTitle').textContent = t.title;
            document.getElementById('playerArtist').textContent = t.artist;
            document.getElementById('playerBar').classList.add('active');
            
            const old = document.getElementById('yt');
            if (old) old.remove();
            
            const c = document.createElement('div');
            c.id = 'yt';
            c.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:1px;opacity:0';
            document.body.appendChild(c);
            c.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/${t.id}?autoplay=1" allow="autoplay"></iframe>`;
            
            isPlaying = true;
            document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-pause"></i>';
        }
        
        function togglePlay() {
            if (isPlaying) {
                const old = document.getElementById('yt');
                if (old) old.remove();
                isPlaying = false;
                document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentIndex >= 0) {
                play(currentIndex);
            }
        }
        
        function next() { if (tracks.length) { currentIndex = (currentIndex + 1) % tracks.length; play(currentIndex); } }
        function prev() { if (tracks.length) { currentIndex = (currentIndex - 1 + tracks.length) % tracks.length; play(currentIndex); } }
        
        // Старт
        if (currentUser) {
            afterLogin();
        }
    </script>
</body>
</html>
